<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | RouteWise</title>
<link rel="stylesheet" href="contact.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <i class="fa-solid fa-route"></i>
        <h2>RouteWise</h2>
    </div>

    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="planner.html">Plan Trip</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<section class="contact">
    <h1>Contact Us</h1>

    <p>Have any questions or suggestions? Feel free to contact us.</p>

    <form id="contactForm">
        <input type="text" placeholder="Enter your name" required>
        <input type="email" placeholder="Enter your email" required>
        <textarea rows="6" placeholder="Enter your message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<section class="info">
    <div class="card">
        <i class="fa-solid fa-location-dot"></i>
        <h3>Address</h3>
        <p>SAKEC, Chembur, Mumbai</p>
    </div>

    <div class="card">
        <i class="fa-solid fa-envelope"></i>
        <h3>Email</h3>
        <p>routewise@gmail.com</p>
    </div>

    <div class="card">
        <i class="fa-solid fa-phone"></i>
        <h3>Phone</h3>
        <p>+91 9876543210</p>
    </div>
</section>

<footer>
    <p>Made by Karan and Jash</p>
</footer>

<script src="contact.js"></script>

</body>
</html>
